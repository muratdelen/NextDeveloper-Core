name: Publish NextLife GHCR image

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/nextlife-ghcr.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: corepack enable
      - name: Generate Backstage application
        run: npx @backstage/create-app@latest --skip-install
        env:
          BACKSTAGE_APP_NAME: nextdeveloper
          YARN_ENABLE_IMMUTABLE_INSTALLS: "false"
      - name: Build Backstage backend
        working-directory: nextdeveloper
        run: |
          yarn install
          yarn build:backend
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: nextdeveloper
          file: nextdeveloper/packages/backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/muratdelen/nextdeveloper-core:latest
            ghcr.io/muratdelen/nextdeveloper-core:git-${{ github.sha }}
